name: Continuous Deployment to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Execute Native Build Over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            # 1. Navigate into your cloud app framework folder
            cd /home/ubuntu/app

            # 2. Pull down your fresh git commits straight to the server
            git pull origin main

            # 3. Trigger a clean, native ARM container recompilation layer
            docker compose build --no-cache

            # 4. Re-launch the container in detached background production mode
            docker compose up -d